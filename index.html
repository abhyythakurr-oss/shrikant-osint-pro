<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shrikant OSINT Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-[#0a0f1e] text-white min-h-screen">

  <!-- Header -->
  <header class="text-center py-8 border-b border-cyan-500">
    <h1 class="text-4xl font-bold text-cyan-400">SHRIKANT OSINT PRO</h1>
    <p class="text-gray-400 mt-2">Legal OSINT Dashboard for CyberCell</p>
  </header>

  <!-- Search Card -->
  <div class="max-w-3xl mx-auto mt-10 p-8 bg-[#111827] rounded-2xl shadow-2xl border-cyan-500">
    <label class="text-lg font-semibold">Search Target</label>
    <input id="search" type="text" placeholder="Enter Username / Mobile / Email / Domain" 
      class="w-full mt-3 p-4 rounded-lg bg-[#1f2937] text-white border-gray-600 focus:border-cyan-400 outline-none">
    
    <div class="grid grid-cols-4 gap-2 mt-4">
      <button class="p-2 bg-gray-700 rounded">Username</button>
      <button class="p-2 bg-gray-700 rounded">Number</button>
      <button class="p-2 bg-gray-700 rounded">Email</button>
      <button class="p-2 bg-gray-700 rounded">Domain</button>
    </div>

    <button onclick="searchOSINT()" 
      class="w-full mt-6 p-4 bg-cyan-600 hover:bg-cyan-700 rounded-lg font-bold text-lg">SCAN NOW ⚡</button>
  </div>

  <!-- Result Box -->
  <div id="result" class="max-w-3xl mx-auto mt-6 p-6"></div>

  <!-- Footer -->
  <footer class="fixed bottom-0 w-full text-center p-4 bg-[#111827] border-t border-cyan-500">
    <p>Developed by: <span class="text-cyan-400 font-bold">Shrikant Rajput</span></p>
    <p class="text-sm text-gray-400">Contact: +91 90277 42793 | Cyber Security Researcher | Pilibhit</p>
  </footer>

<script>
function searchOSINT(){
  let q = document.getElementById("search").value;
  document.getElementById("result").innerHTML = 
  `<div class="p-6 bg-[#111827] rounded-lg border-cyan-500">
    <h2 class="text-xl font-bold text-cyan-400">Scanning: ${q}</h2>
    <p class="mt-2 text-gray-400">Backend connect karne ke baad yaha result aayega</p>
  </div>`
}
</script>

</body>
</html>
