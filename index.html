<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shrikant OSINT Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style> 
    body { font-family: 'Poppins', sans-serif; } 
    .loader { border: 4px solid #1f2937; border-top: 4px solid #06b6d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
  </style>
</head>
<body class="bg-[#0a0f1e] text-white min-h-screen pb-24">

  <!-- Header -->
  <header class="text-center py-8 border-b border-cyan-500">
    <h1 class="text-4xl font-bold text-cyan-400">SHRIKANT OSINT PRO</h1>
    <p class="text-gray-400 mt-2">Legal OSINT Dashboard for CyberCell</p>
  </header>

  <!-- Search Card -->
  <div class="max-w-3xl mx-auto mt-10 p-8 bg-[#111827] rounded-2xl shadow-2xl border-cyan-500">
    <label class="text-lg font-semibold">Search Target</label>
    <input id="search" type="text" placeholder="Enter Username / Mobile / Email / Domain" 
      class="w-full mt-3 p-4 rounded-lg bg-[#1f2937] text-white border border-gray-600 focus:border-cyan-400 outline-none">
    
    <button onclick="searchOSINT()" 
      class="w-full mt-6 p-4 bg-cyan-600 hover:bg-cyan-700 rounded-lg font-bold text-lg">SCAN NOW ⚡</button>
  </div>

  <!-- Result Box -->
  <div id="result" class="max-w-3xl mx-auto mt-6 p-6"></div>

  <!-- Footer -->
  <footer class="fixed bottom-0 w-full text-center p-4 bg-[#111827] border-t border-cyan-500">
    <p>Developed by: <span class="text-cyan-400 font-bold">Shrikant Rajput</span></p>
    <p class="text-sm text-gray-400">Contact: +91 90277 42793 | Cyber Security Researcher | Pilibhit</p>
  </footer>

<script>
async function searchOSINT(){
  let q = document.getElementById("search").value;
  if(q.trim() == "") { alert("Kuch to daalo bhai"); return; }
  
  // Loading dikhao
  document.getElementById("result").innerHTML = 
  `<div class="p-6 bg-[#111827] rounded-lg border border-cyan-500 flex items-center gap-4">
    <div class="loader"></div>
    <p class="text-cyan-400">Scanning ${q}... Please wait 10-20 sec</p>
  </div>`
  
  // Backend /search ko call karo
  let formData = new FormData();
  formData.append("query", q);
  
  try {
    let res = await fetch('/search', {method: 'POST', body: formData});
    let data = await res.json();
    
    document.getElementById("result").innerHTML = 
    `<div class="p-6 bg-[#111827] rounded-lg border-cyan-500">
      <h2 class="text-xl font-bold text-cyan-400">Result for: ${q}</h2>
      <pre class="mt-4 text-green-400 whitespace-pre-wrap bg-black p-4 rounded">${data.result}</pre>
    </div>`
  } catch(e) {
    document.getElementById("result").innerHTML = 
    `<div class="p-6 bg-red-900 rounded-lg">Error: Backend connect nahi hua. app.py chal raha hai kya?</div>`
  }
}
</script>

</body>
</html>
